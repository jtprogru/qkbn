# yaml-language-server: $schema=https://taskfile.dev/schema.json
---
version: "3"

vars:
  BINARY_NAME: qkbn
  DIST_DIR: dist

tasks:
  default:
    cmds:
      - task --list
    silent: true

  # === Разработка ===
  run:
    desc: Запуск через go run
    cmds:
      - "go run cmd/{{ .BINARY_NAME }}/main.go {{ .CLI_ARGS }}"

  build:
    desc: Сборка бинарника
    deps:
      - tidy
    cmds:
      - "go mod download"
      - "CGO_ENABLED=0 go build -o ./{{ .DIST_DIR }}/{{ .BINARY_NAME }} cmd/{{ .BINARY_NAME }}/main.go"

  install:
    desc: Установка глобально
    cmds:
      - "go install ./cmd/{{ .BINARY_NAME }}"

  install:dev:
    desc: Установка в GOPATH/bin
    cmds:
      - "go install ./cmd/{{ .BINARY_NAME }}"

  # === Модули ===
  tidy:
    desc: go mod tidy
    cmds:
      - "go mod tidy"

  # === Форматирование и линтинг ===
  fmt:
    desc: Форматирование кода
    cmds:
      - "gofmt -s -w ."

  vet:
    desc: go vet
    cmds:
      - "go vet ./..."

  lint:
    desc: Запуск golangci-lint
    cmds:
      - "golangci-lint run -v"

  # === Тесты ===
  test:
    desc: Все тесты
    cmds:
      - "go test -v -coverprofile=cover.out ./..."

  test:short:
    desc: Короткие тесты
    cmds:
      - "go test --short -v ./..."

  test:race:
    desc: Тесты с race detector
    cmds:
      - "go test -race -v ./..."

  test:coverage:
    desc: Тесты с покрытием
    cmds:
      - "go test -coverprofile=cover.out ./..."
      - "go tool cover -func=cover.out"
      - "go tool cover -html=cover.out -o cover.html"
      - "echo 'Отчёт о покрытии: cover.html'"

  # === Очистка ===
  clean:
    desc: Очистка артефактов
    cmds:
      - "rm -rf ./{{ .DIST_DIR }}"
      - "rm -f cover.out cover.html"
      - "rm -f {{ .BINARY_NAME }}"

  # === Релиз ===
  release:
    desc: Создание релиза через goreleaser
    deps:
      - test
      - lint
    cmds:
      - "goreleaser build --snapshot --clean"

  release:full:
    desc: Полный релиз (требует настройки GPG и токенов)
    deps:
      - test
      - lint
    cmds:
      - "goreleaser release --clean"
